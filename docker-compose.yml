services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: copycat
      POSTGRES_USER: copycat
      POSTGRES_PASSWORD: copycat
    ports:
      - "5432:5432"
    volumes:
      - copycat-postgres:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: src/CopyCat.Web/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      ConnectionStrings__CopyCat: Host=postgres;Port=5432;Database=copycat;Username=copycat;Password=copycat
      Security__ApplicationName: CopyCat
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: src/CopyCat.Worker/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      ConnectionStrings__CopyCat: Host=postgres;Port=5432;Database=copycat;Username=copycat;Password=copycat
      Security__ApplicationName: CopyCat

volumes:
  copycat-postgres:
